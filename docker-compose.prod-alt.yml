# Docker Compose para Producción - Alternativa (puerto 8080)
# Uso cuando el puerto 80 está ocupado
# docker-compose -f docker-compose.yml -f docker-compose.prod-alt.yml up -d

version: '3.8'

services:
  webserver:
    ports:
      - "8080:80"  # Usar puerto 8080 en lugar de 80
      - "8443:443"  # Usar puerto 8443 para HTTPS
    # Resto de la configuración igual
