# Docker Compose para Desarrollo
# Uso: docker-compose -f docker-compose.dev.yml up -d

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: inventario_app_dev
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - inventario-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=inventario_db
      - DB_USERNAME=inventario_user
      - DB_PASSWORD=root
      - APP_ENV=local
      - APP_DEBUG=true
    # Sin límites de recursos en desarrollo

  webserver:
    image: nginx:alpine
    container_name: inventario_webserver_dev
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - inventario-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: inventario_db_dev
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: inventario_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: inventario_user
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata_dev:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - inventario-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  inventario-network:
    driver: bridge

volumes:
  dbdata_dev:
    driver: local
